name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK with Bubblewrap
        run: |
          npm install -g @bubblewrap/cli
          bubblewrap init --manifest="https://zhangfs95.github.io/qixi-countdown/manifest.json" --directory ./twa
          cd twa
          # 用 debug 密钥签名
          keytool -genkey -v -keystore debug.keystore -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Debug, OU=Dev, O=PWA, L=City, S=State, C=CN" 2>/dev/null || true
          bubblewrap build

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: qixi-countdown-apk
          path: twa/*.apk
